name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web,dev]"
          pip install pytest pytest-cov

      - name: Lint with ruff
        run: |
          ruff check fundautopsy/ tests/

      - name: Type check with mypy
        run: |
          mypy fundautopsy/ --ignore-missing-imports

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=fundautopsy --cov-report=term-missing

      - name: Check imports
        run: |
          python -c "import fundautopsy; print(f'fundautopsy {fundautopsy.__version__} imported successfully')"
